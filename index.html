<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>The Productivity Matrix</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <h1 class="main-title">THE PRODUCTIVITY MATRIX</h1>
        <p class="subtitle">Focus your energy where it matters most.</p>
      </header>

      <main class="matrix-wrapper">
        <div class="matrix">
          <!-- Labels aligned to grid axes -->
          <div class="axis-label vertical top">WANT TO DO</div>
          <div class="axis-label vertical bottom">DON'T WANT TO DO</div>
          <div class="axis-label horizontal left">UNPRODUCTIVE</div>
          <div class="axis-label horizontal right">PRODUCTIVE</div>

          <!-- Quadrants -->
          <div class="quadrant tl-quad active-tab" data-id="tl">
            <h2 class="mobile-quad-title">Want to do / Unproductive</h2>
            <div class="task-list" id="task-list-tl"></div>
            <div class="quick-add-overlay">
              <input type="text" class="quick-add-input" placeholder="Type and press Enter..." />
            </div>
          </div>
          <div class="quadrant tr-quad" data-id="tr">
            <h2 class="mobile-quad-title">Want to do / Productive</h2>
            <div class="task-list" id="task-list-tr"></div>
            <div class="quick-add-overlay">
              <input type="text" class="quick-add-input" placeholder="Type and press Enter..." />
            </div>
          </div>
          <div class="quadrant bl-quad" data-id="bl">
            <h2 class="mobile-quad-title">Don't want to do / Unproductive</h2>
            <div class="task-list" id="task-list-bl"></div>
            <div class="quick-add-overlay">
              <input type="text" class="quick-add-input" placeholder="Type and press Enter..." />
            </div>
          </div>
          <div class="quadrant br-quad" data-id="br">
            <h2 class="mobile-quad-title">Don't want to do / Productive</h2>
            <div class="task-list" id="task-list-br"></div>
            <div class="quick-add-overlay">
              <input type="text" class="quick-add-input" placeholder="Type and press Enter..." />
            </div>
          </div>
          
          <!-- Crosshair center point -->
          <div class="matrix-center-point"></div>
        </div>
      </main>

      <!-- Mobile Navigation Bar -->
      <nav class="mobile-nav">
        <button class="nav-btn active" data-target="tl">
          <div class="nav-dot" style="background: var(--quad-red)"></div>
          <span>TL</span>
        </button>
        <button class="nav-btn" data-target="tr">
          <div class="nav-dot" style="background: var(--quad-green)"></div>
          <span>TR</span>
        </button>
        <button class="nav-btn" data-target="bl">
          <div class="nav-dot" style="background: var(--quad-yellow)"></div>
          <span>BL</span>
        </button>
        <button class="nav-btn" data-target="br">
          <div class="nav-dot" style="background: var(--quad-blue)"></div>
          <span>BR</span>
        </button>
      </nav>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
